<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hatay Turizm Atlası</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #050505;
      --surface-color: rgba(20, 20, 22, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --primary: #8b5cf6; /* Vibrant purple */
      --primary-glow: rgba(139, 92, 246, 0.4);
      --secondary: #3b82f6; /* Vibrant blue */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      --card: oklch(0.12 0.01 0);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient Background Gradients */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.4;
      pointer-events: none;
      animation: float 20s infinite ease-in-out alternate;
    }
    body::before {
      background: radial-gradient(circle, var(--primary), transparent 70%);
      top: -200px;
      left: -200px;
    }
    body::after {
      background: radial-gradient(circle, var(--secondary), transparent 70%);
      bottom: -100px;
      right: -200px;
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* Glass Navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 1.25rem 2rem;
      background: var(--surface-color);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .nav-brand {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .nav-brand svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: url(#brand-gradient);
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 99px;
      transition: all 0.3s ease;
      background: transparent;
    }
    
    .nav-links a:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main Embed Container */
    .hero-section {
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .hero-subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto 2rem auto;
      line-height: 1.6;
    }

    .embed-wrapper {
      flex: 1;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto 4rem auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      animation: fadeUp 1s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
      z-index: 2;
      position: relative;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .iframe-container {
      position: relative;
      width: 100%;
      height: 75vh;
      min-height: 600px;
      border-radius: 24px;
      padding: 6px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 40px var(--primary-glow);
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .iframe-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 60px -12px rgba(0,0,0,0.6), 0 0 60px var(--primary-glow);
    }

    .iframe-inner {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      position: relative;
      z-index: 2;
    }

    /* Fullscreen Fallback for Mobile (iOS Safari vb.) */
    .iframe-container.is-fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      z-index: 99999;
      padding: 0;
      border-radius: 0;
      margin: 0;
      transform: none !important;
      box-shadow: none !important;
    }

    .iframe-container.is-fullscreen .iframe-inner {
      border-radius: 0;
    }

    /* Loader inside iframe container just for visual effect before load */
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 48px;
      height: 48px;
      border: 4px solid var(--glass-border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 1; 
    }

    @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

    /* Footer - Exact Match from Georehber, enhanced for dark modern theme */
    .footer {
      background-color: var(--card);
      border-top: 1px solid var(--glass-border);
      padding: 3rem 0 2rem 0;
      margin-top: auto;
      z-index: 10;
      position: relative;
    }

    .footer-container {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .footer-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
    }

    @media (min-width: 768px) {
      .footer-content {
        flex-direction: row;
        justify-content: space-between;
      }
    }

    .footer-text {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .footer-links a {
      color: var(--text-muted);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }

    .footer-links a:hover {
      color: #fff;
      background: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .footer-links svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    
    .footer-links .stroke-icon {
      fill: none;
      stroke: currentColor;
    }

    .fullscreen-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 20;
      background: var(--surface-color);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .fullscreen-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--primary-glow);
    }
    
    .fullscreen-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Mobil için tamamen tam ekran (Uygulama görünümü) */
    @media (max-width: 768px) {
      body {
        overflow: hidden; /* Sayfa kaydırmasını engelle */
      }
      
      .navbar,
      .hero-section,
      .footer,
      .fullscreen-btn {
        display: none !important; /* Başlık, menü, footer ve tam ekran butonunu gizle */
      }
      
      .embed-wrapper {
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* iOS Safari araç çubuğu için dinamik yükseklik */
        max-width: 100%;
        animation: none;
        opacity: 1;
        transform: none;
        flex: unset;
      }
      
      .iframe-container {
        height: 100%;
        width: 100%;
        min-height: unset;
        border-radius: 0;
        padding: 0;
        background: none;
        box-shadow: none;
      }
      
      .iframe-container:hover {
        transform: none;
        box-shadow: none;
      }
      
      .iframe-inner {
        border-radius: 0;
      }
    }
  </style>
</head>

<body>

  <script>
    function toggleFullscreen() {
      const container = document.querySelector('.iframe-container');
      const iframe = document.getElementById('mapIframe');
      
      const isNativeFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
      const isCssFullscreen = container.classList.contains('is-fullscreen');

      if (isCssFullscreen) {
        container.classList.remove('is-fullscreen');
        document.body.style.overflow = '';
        return;
      }

      if (isNativeFullscreen) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        return;
      }

      if (container.requestFullscreen) {
        container.requestFullscreen().catch(() => enableCssFullscreen());
      } else if (container.webkitRequestFullscreen) {
        container.webkitRequestFullscreen();
      } else if (container.msRequestFullscreen) {
        container.msRequestFullscreen();
      } else {
        // Fallback for iOS Safari (iPhone) and others without native Fullscreen API
        enableCssFullscreen();
      }

      function enableCssFullscreen() {
        container.classList.add('is-fullscreen');
        document.body.style.overflow = 'hidden';
      }
    }
  </script>
